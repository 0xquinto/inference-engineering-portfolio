model:
  name: Qwen/Qwen3.5-9B
  type: dense
  params: 9B

workload:
  classes:
    short:
      share: 0.4
      output_tokens: 50
      max_tokens: 64
      slo_seconds: 2.0
      prompt: "What is the capital of France? Answer in one sentence."
    medium:
      share: 0.4
      output_tokens: 200
      max_tokens: 256
      slo_seconds: 8.0
      prompt: "Summarize the key benefits of renewable energy in 3-4 paragraphs."
    long:
      share: 0.2
      output_tokens: 500
      max_tokens: 512
      slo_seconds: 20.0
      prompt: "Write a Python function that implements a binary search tree with insert, delete, and search operations. Include docstrings and type hints."

policies:
  - fcfs
  - priority
  - slo_aware

benchmark:
  engine: vllm
  port: 8010
  model_id: "Qwen/Qwen3.5-9B"
  qps_levels: [1, 5, 10, 20]
  requests_per_qps: 30
  max_tokens: 512
  temperature: 0.0
  warmup_requests: 3

scheduler:
  max_queue_depth: 50
  max_concurrent: 10
