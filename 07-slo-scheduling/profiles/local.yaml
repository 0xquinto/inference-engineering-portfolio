model:
  name: Qwen/Qwen3.5-4B
  type: dense
  params: 4B

workload:
  classes:
    short:
      share: 0.4
      output_tokens: 50
      slo_seconds: 5.0
      prompt: "What is the capital of France? Answer in one sentence."
    medium:
      share: 0.4
      output_tokens: 200
      slo_seconds: 20.0
      prompt: "Summarize the key benefits of renewable energy in 3-4 paragraphs."
    long:
      share: 0.2
      output_tokens: 500
      slo_seconds: 60.0
      prompt: "Write a Python function that implements a binary search tree with insert, delete, and search operations. Include docstrings and type hints."

policies:
  - fcfs
  - slo_aware

benchmark:
  engine: ollama
  port: 11434
  model_id: "qwen3.5:4b"
  qps_levels: [1, 2, 5]
  requests_per_qps: 10
  max_tokens: 512
  temperature: 0.0
  warmup_requests: 2

scheduler:
  max_queue_depth: 20
  max_concurrent: 3
