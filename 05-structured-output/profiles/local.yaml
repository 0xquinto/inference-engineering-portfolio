model:
  name: Qwen/Qwen3.5-4B
  type: dense
  params: 4B

backends:
  json_schema:
    description: "JSON schema constrained decoding"
    guided_decoding_backend: json_schema
  unconstrained:
    description: "No grammar enforcement (baseline + retry)"
    guided_decoding_backend: null

schemas:
  simple_json:
    description: "Flat JSON object with 3 string fields"
    complexity: low
  function_call:
    description: "Tool-calling schema with dynamic function selection"
    complexity: high

benchmark:
  engine: ollama
  port: 11434
  model_id: "qwen3.5:4b"
  schema_format: response_format  # OpenAI-standard (works with Ollama)
  concurrency_levels: [1, 5]
  warmup_requests: 2
  requests_per_prompt: 3
  max_tokens: 512
  temperature: 0.0
  max_retries: 3
